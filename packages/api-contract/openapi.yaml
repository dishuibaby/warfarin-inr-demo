openapi: 3.0.3
info:
  title: Warfarin INR Assistant API
  version: 0.1.0
  description: |
    MVP API contract for medication logging, INR monitoring, settings and home summary.
    This product records and reminds only; it does not provide medical dosage advice.
servers:
  - url: http://127.0.0.1:8080/api/v1
paths:
  /home/summary:
    get:
      summary: Home summary
      responses:
        '200':
          description: Latest INR, next test time, reminder and medication state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeSummaryEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /medication/records:
    post:
      summary: Create medication action record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMedicationRecordRequest'
      responses:
        '200':
          description: Created medication record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicationRecordEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /inr/records:
    get:
      summary: List INR records
      responses:
        '200':
          description: INR records sorted by testedAt descending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/INRRecordListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Create INR record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateINRRecordRequest'
      responses:
        '200':
          description: Created INR record with raw, corrected, trend and tier fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/INRRecordEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /settings:
    get:
      summary: Get user settings
      responses:
        '200':
          description: User settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
    put:
      summary: Update user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettings'
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
components:
  responses:
    BadRequest:
      description: Validation or parsing error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    BaseEnvelope:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
    ErrorEnvelope:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          properties:
            code:
              type: integer
              example: 400
            message:
              type: string
              example: time must be RFC3339
    HomeSummaryEnvelope:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/HomeSummary'
    MedicationRecordEnvelope:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/MedicationRecord'
    INRRecordEnvelope:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/INRRecord'
    INRRecordListEnvelope:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/INRRecordsResponse'
    INRRecordsResponse:
      type: object
      required: [records, trend, targetRange]
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/INRRecord'
        trend:
          type: array
          description: Chronological points for the raw/corrected dual-line trend chart.
          items:
            $ref: '#/components/schemas/INRTrendPoint'
        targetRange:
          $ref: '#/components/schemas/TargetRange'
    INRTrendPoint:
      type: object
      required: [date, rawValue, correctedValue]
      properties:
        date:
          type: string
          example: '04/23'
        rawValue:
          type: number
        correctedValue:
          type: number
    TargetRange:
      type: object
      required: [min, max]
      properties:
        min:
          type: number
          example: 1.8
        max:
          type: number
          example: 2.5
    UserSettingsEnvelope:
      allOf:
        - $ref: '#/components/schemas/BaseEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/UserSettings'
    Reminder:
      type: object
      required: [level, title, body]
      properties:
        level:
          type: string
          enum: [normal, weak, strong]
        title:
          type: string
        body:
          type: string
    TodayMedication:
      type: object
      required: [status, plannedDoseTablets]
      properties:
        status:
          type: string
          enum: [pending, taken, paused, missed]
        plannedDoseTablets:
          type: number
    HomeSummary:
      type: object
      required: [prominentReminder, latestInr, nextTestAt, todayMedication]
      properties:
        prominentReminder:
          $ref: '#/components/schemas/Reminder'
        latestInr:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/INRRecord'
        nextTestAt:
          type: string
          format: date-time
        todayMedication:
          $ref: '#/components/schemas/TodayMedication'
    CreateMedicationRecordRequest:
      type: object
      required: [actionType, actualDoseTablets, tomorrowDoseMode]
      properties:
        actionType:
          type: string
          enum: [taken, paused, missed]
        actualDoseTablets:
          type: number
        tomorrowDoseMode:
          type: string
          enum: [planned, manual]
        tomorrowDoseTablets:
          type: number
          nullable: true
          description: Required by clients when tomorrowDoseMode is manual.
    MedicationRecord:
      type: object
      required: [id, actionType, actualDoseTablets, recordedAt, tomorrowDoseMode]
      properties:
        id:
          type: string
          example: med-1
        actionType:
          type: string
          enum: [taken, paused, missed]
        actualDoseTablets:
          type: number
        recordedAt:
          type: string
          format: date-time
        tomorrowDoseMode:
          type: string
          enum: [planned, manual]
        tomorrowDoseTablets:
          type: number
          nullable: true
    CreateINRRecordRequest:
      type: object
      required: [rawValue, testMethod, testedAt]
      properties:
        rawValue:
          type: number
          exclusiveMinimum: true
          minimum: 0
        offset:
          type: number
          nullable: true
          description: Optional correction offset. Defaults to settings.inrOffset when omitted.
        testMethod:
          type: string
          enum: [hospital_lab, poct_device, home_device, other]
        testedAt:
          type: string
          format: date-time
    INRRecord:
      type: object
      required: [id, rawValue, offsetValue, correctedValue, trend, abnormalTier, testMethod, testedAt]
      properties:
        id:
          type: string
          example: inr-1
        rawValue:
          type: number
        offsetValue:
          type: number
          description: Applied correction offset snapshot. It is preserved per record so historical INR values do not change when settings change.
        correctedValue:
          type: number
          description: rawValue plus either request offset or settings.inrOffset.
        trend:
          type: string
          enum: [low, in_range, high]
          description: Directional placement of correctedValue against the configured target range.
        abnormalTier:
          type: string
          enum: [normal, weak_low, weak_high, strong_low, strong_high]
          description: Risk tier using the configured target range and a 0.1 weak band.
        testMethod:
          type: string
          enum: [hospital_lab, poct_device, home_device, other]
        testedAt:
          type: string
          format: date-time
    TestCycle:
      type: object
      required: [unit, interval]
      properties:
        unit:
          type: string
          enum: [day, week, month]
        interval:
          type: integer
          minimum: 1
    UserSettings:
      type: object
      required: [targetInrMin, targetInrMax, defaultMedicationTime, testCycle, testMethods, inrOffset]
      properties:
        targetInrMin:
          type: number
          example: 1.8
        targetInrMax:
          type: number
          example: 2.5
        defaultMedicationTime:
          type: string
          example: '08:00'
        testCycle:
          $ref: '#/components/schemas/TestCycle'
        testMethods:
          type: array
          minItems: 1
          items:
            type: string
            enum: [hospital_lab, poct_device, home_device, other]
        inrOffset:
          type: number
          example: 0.0
